  sql_queries:
    - - main
      - xorq_datafusion
      - |-
        SELECT
          *
        FROM (
          SELECT
            "t2"."Origin",
            "t2"."DepTimeBlk",
            "t2"."flights",
            "t2"."avg_dep_delay",
            "t2"."avg_arr_delay",
            "t2"."pct_dep_del15",
            "t2"."pct_arr_del15",
            "t2"."avg_carrier_delay",
            "t2"."avg_late_aircraft_delay",
            "t2"."avg_nas_delay",
            "t2"."avg_weather_delay",
            SUM("t2"."flights") OVER (
              PARTITION BY "t2"."Origin"
              ORDER BY "t2"."DepTimeBlk" ASC
              ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW
            ) AS "cum_flights",
            CAST(SUM("t2"."avg_dep_delay" * "t2"."flights") OVER (
              PARTITION BY "t2"."Origin"
              ORDER BY "t2"."DepTimeBlk" ASC
              ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW
            ) AS DOUBLE PRECISION) / SUM("t2"."flights") OVER (
              PARTITION BY "t2"."Origin"
              ORDER BY "t2"."DepTimeBlk" ASC
              ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW
            ) AS "cum_avg_dep_delay",
            CAST(SUM("t2"."avg_arr_delay" * "t2"."flights") OVER (
              PARTITION BY "t2"."Origin"
              ORDER BY "t2"."DepTimeBlk" ASC
              ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW
            ) AS DOUBLE PRECISION) / SUM("t2"."flights") OVER (
              PARTITION BY "t2"."Origin"
              ORDER BY "t2"."DepTimeBlk" ASC
              ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW
            ) AS "cum_avg_arr_delay",
            CAST(SUM("t2"."avg_late_aircraft_delay" * "t2"."flights") OVER (
              PARTITION BY "t2"."Origin"
              ORDER BY "t2"."DepTimeBlk" ASC
              ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW
            ) AS DOUBLE PRECISION) / SUM("t2"."flights") OVER (
              PARTITION BY "t2"."Origin"
              ORDER BY "t2"."DepTimeBlk" ASC
              ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW
            ) AS "cum_avg_late_aircraft_delay",
            "t2"."avg_arr_delay" - "t2"."avg_dep_delay" AS "delay_propagation"
          FROM (
            SELECT
              "t1"."Origin",
              "t1"."DepTimeBlk",
              SUM("t1"."Flights") AS "flights",
              AVG("t1"."DepDelayMinutes") AS "avg_dep_delay",
              AVG("t1"."ArrDelayMinutes") AS "avg_arr_delay",
              AVG("t1"."DepDel15") * 100 AS "pct_dep_del15",
              AVG("t1"."ArrDel15") * 100 AS "pct_arr_del15",
              AVG("t1"."CarrierDelay") AS "avg_carrier_delay",
              AVG("t1"."LateAircraftDelay") AS "avg_late_aircraft_delay",
              AVG("t1"."NASDelay") AS "avg_nas_delay",
              AVG("t1"."WeatherDelay") AS "avg_weather_delay"
            FROM (
              SELECT
                "t1"."Year",
